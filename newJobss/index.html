<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Việc Làm Bảo Vệ</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, textarea, button { margin: 5px 0; padding: 8px; width: 100%; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    .job-list { margin-top: 20px; }
    .job-item { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px; background: #fff; }
    .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
  </style>
</head>
<body>

<div id="loginPage" class="container login-box">
  <h2>Đăng nhập Admin</h2>
  <input type="text" id="username" placeholder="Tên đăng nhập" value="admin"><br>
  <input type="password" id="password" placeholder="Mật khẩu" value="admin"><br>
  <button onclick="login()">Đăng nhập</button>
</div>

<div id="mainPage" class="container" style="display:none;">
  <h1>Quản Lý Việc Làm Bảo Vệ</h1>
  <button onclick="logout()">Đăng xuất</button>

  <h3>Thêm việc làm mới</h3>
  <input type="text" id="title" placeholder="Tiêu đề công việc">
  <input type="text" id="company" placeholder="Tên công ty">
  <input type="text" id="location" placeholder="Địa điểm">
  <input type="text" id="salary" placeholder="Mức lương">
  <textarea id="description" placeholder="Mô tả công việc" rows="4"></textarea>
  <button onclick="addJob()">Thêm Việc Làm</button>

  <h3>Danh sách việc làm</h3>
  <div id="jobList" class="job-list"></div>
</div>

<script>
// ================== CONFIG FIREBASE ==================
const firebaseConfig = {
  databaseURL: "https://unityvina-1fc51-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================== LOGIN ==================
function login() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();
  
  if (user === "admin" && pass === "admin") {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    loadJobs();
  } else {
    alert("Sai tài khoản hoặc mật khẩu!");
  }
}

function logout() {
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('mainPage').style.display = 'none';
}

// ================== THÊM VIỆC LÀM + KIỂM TRA TRÙNG ==================
async function addJob() {
  const title = document.getElementById('title').value.trim();
  const company = document.getElementById('company').value.trim();
  const location = document.getElementById('location').value.trim();
  const salary = document.getElementById('salary').value.trim();
  const description = document.getElementById('description').value.trim();

  if (!title || !company) {
    alert("Tiêu đề và công ty không được để trống!");
    return;
  }

  // Kiểm tra trùng
  const snapshot = await db.ref('jobs').once('value');
  const jobs = snapshot.val() || {};

  const isDuplicate = Object.values(jobs).some(job => 
    job.title.toLowerCase() === title.toLowerCase() && 
    job.company.toLowerCase() === company.toLowerCase()
  );

  if (isDuplicate) {
    alert("Việc làm này đã tồn tại (trùng tiêu đề + công ty)!");
    return;
  }

  // Thêm mới
  const newJobRef = db.ref('jobs').push();
  await newJobRef.set({
    id: newJobRef.key,
    title,
    company,
    location,
    salary,
    description,
    createdAt: Date.now()
  });

  alert("Thêm việc làm thành công!");
  clearForm();
  loadJobs();
}

function clearForm() {
  document.getElementById('title').value = '';
  document.getElementById('company').value = '';
  document.getElementById('location').value = '';
  document.getElementById('salary').value = '';
  document.getElementById('description').value = '';
}

// ================== HIỂN THỊ DANH SÁCH ==================
function loadJobs() {
  const jobList = document.getElementById('jobList');
  jobList.innerHTML = '';

  db.ref('jobs').on('value', (snapshot) => {
    const jobs = snapshot.val() || {};
    jobList.innerHTML = '';

    Object.values(jobs).reverse().forEach(job => {
      const div = document.createElement('div');
      div.className = 'job-item';
      div.innerHTML = `
        <strong>${job.title}</strong> - ${job.company}<br>
        <small>Địa điểm: ${job.location || 'Không có'} | Lương: ${job.salary || 'Thỏa thuận'}</small><br>
        <p>${job.description || ''}</p>
        <button onclick="deleteJob('${job.id}')">Xóa</button>
      `;
      jobList.appendChild(div);
    });
  });
}

// ================== XÓA VIỆC LÀM ==================
async function deleteJob(jobId) {
  if (confirm("Bạn có chắc muốn xóa việc làm này?")) {
    await db.ref('jobs/' + jobId).remove();
    alert("Đã xóa!");
  }
}
</script>

</body>
</html>

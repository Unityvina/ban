<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Ký Khách Vào</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0D1B3E;
      --blue:   #1A56DB;
      --sky:    #EBF2FF;
      --gold:   #F59E0B;
      --white:  #FFFFFF;
      --gray50: #F8FAFC;
      --gray100:#F1F5F9;
      --gray300:#CBD5E1;
      --gray500:#64748B;
      --gray700:#334155;
      --red:    #EF4444;
      --green:  #10B981;
      --radius: 10px;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--gray50);
      min-height: 100vh;
      color: var(--gray700);
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header-icon {
      width: 38px; height: 38px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
    header p  { font-size: 12px; color: var(--gray300); margin-top: 1px; }

    /* ── MAIN ── */
    main {
      max-width: 700px;
      margin: 28px auto 60px;
      padding: 0 16px;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
      overflow: hidden;
    }

    /* ── SECTION HEADER ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--gray100);
    }
    .badge {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--sky);
      color: var(--blue);
      font-weight: 700;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .section-head h2 { font-size: 14px; font-weight: 600; color: var(--navy); }

    /* ── FORM GRID ── */
    .fields {
      padding: 16px 20px 20px;
      display: grid;
      gap: 14px;
    }
    .row-2 { grid-template-columns: 1fr 1fr; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }

    @media(max-width: 540px) {
      .row-2, .row-3 { grid-template-columns: 1fr; }
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--gray700);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    label span.req { color: var(--red); margin-left: 2px; }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray300);
      border-radius: var(--radius);
      font-size: 14.5px;
      font-family: inherit;
      color: var(--navy);
      background: var(--white);
      transition: border-color .18s, box-shadow .18s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,86,219,.12);
    }
    input::placeholder { color: var(--gray300); }
    textarea { resize: vertical; min-height: 70px; }

    select { cursor: pointer; }

    /* ── DIVIDER ── */
    .divider { height: 8px; background: var(--gray50); border-top: 1px solid var(--gray100); border-bottom: 1px solid var(--gray100); }

    /* ── SUBMIT ── */
    .submit-wrap {
      padding: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button[type="submit"] {
      flex: 1;
      padding: 13px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s, transform .1s;
      letter-spacing: .3px;
    }
    button[type="submit"]:hover  { background: #1345B7; }
    button[type="submit"]:active { transform: scale(.98); }
    button[type="submit"]:disabled { background: var(--gray300); cursor: not-allowed; }

    button[type="button"].reset-btn {
      padding: 13px 18px;
      background: var(--gray100);
      color: var(--gray700);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    button[type="button"].reset-btn:hover { background: var(--gray300); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 6px 24px rgba(0,0,0,.25);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green); }
    #toast.error   { background: var(--red); }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    button[type="submit"].loading .spinner { display: inline-block; }
    button[type="submit"].loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── COMPANY DISPLAY ── */
    .company-display {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      padding: 10px 12px;
      background: var(--sky);
      border: 1.5px solid #c7d9f8;
      border-radius: var(--radius);
      min-height: 42px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🏢</div>
  <div>
    <h1>Sổ Đăng Ký Khách Vào</h1>
    <p>VLB Bảo Vệ Work – Cổng Kiểm Soát</p>
  </div>
</header>

<main>
  <form id="regForm" novalidate>
    <div class="card">

      <!-- SECTION 1: Công ty -->
      <div class="section-head">
        <div class="badge">1</div>
        <h2>Thông Tin Công Ty</h2>
      </div>
      <div class="fields">
        <label>
          Tên công ty <span class="req">*</span>
          <input id="companyName" type="text" placeholder="Nhập tên công ty khách đến..." required />
        </label>
      </div>

      <div class="divider"></div>

      <!-- SECTION 2: Khách -->
      <div class="section-head">
        <div class="badge">2</div>
        <h2>Thông Tin Khách</h2>
      </div>
      <div class="fields">
        <div class="row-2" style="display:grid;gap:14px;">
          <label>
            Họ và tên <span class="req">*</span>
            <input id="fullName" type="text" placeholder="Nguyễn Văn A" required />
          </label>
          <label>
            Số điện thoại <span class="req">*</span>
            <input id="phone" type="tel" placeholder="09xx xxx xxx" required />
          </label>
        </div>
        <label>
          Ngày tháng năm sinh <span class="req">*</span>
          <input id="dob" type="date" required />
        </label>
      </div>

      <div class="divider"></div>

      <!-- SECTION 3: CMND -->
      <div class="section-head">
        <div class="badge">3</div>
        <h2>Giấy Tờ Tùy Thân</h2>
      </div>
      <div class="fields">
        <div class="row-3" style="display:grid;gap:14px;">
          <label>
            Số CMT / CCCD <span class="req">*</span>
            <input id="idNumber" type="text" placeholder="012 345 678 90" required />
          </label>
          <label>
            Ngày cấp <span class="req">*</span>
            <input id="idDate" type="date" required />
          </label>
          <label>
            Nơi cấp <span class="req">*</span>
            <input id="idPlace" type="text" placeholder="CA tỉnh / TP..." required />
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <!-- SECTION 4: Vào -->
      <div class="section-head">
        <div class="badge">4</div>
        <h2>Thông Tin Vào</h2>
      </div>
      <div class="fields">
        <div class="row-2" style="display:grid;gap:14px;">
          <label>
            Thời gian vào <span class="req">*</span>
            <input id="entryTime" type="datetime-local" required />
          </label>
          <label>
            Người phụ trách <span class="req">*</span>
            <input id="supervisor" type="text" placeholder="Tên người phụ trách..." required />
          </label>
        </div>
        <label>
          Bộ phận / Phòng ban <span class="req">*</span>
          <select id="department" required>
            <option value="">-- Chọn bộ phận --</option>
            <option>Ban Giám Đốc</option>
            <option>Hành Chính – Nhân Sự</option>
            <option>Kế Toán – Tài Chính</option>
            <option>Kinh Doanh – Marketing</option>
            <option>Kỹ Thuật – IT</option>
            <option>Bảo Vệ – An Ninh</option>
            <option>Kho Vận – Logistics</option>
            <option>Sản Xuất</option>
            <option>Khác</option>
          </select>
        </label>
        <label>
          Lý do vào <span class="req">*</span>
          <textarea id="reason" placeholder="Mục đích, lý do vào trong..." required></textarea>
        </label>
      </div>

      <!-- SUBMIT -->
      <div class="submit-wrap">
        <button type="button" class="reset-btn" onclick="resetForm()">🔄 Làm lại</button>
        <button type="submit" id="submitBtn">
          <span class="btn-text">✅ Lưu Đăng Ký</span>
          <span class="spinner"></span>
        </button>
      </div>

    </div>
  </form>
</main>

<div id="toast"></div>

<script>
  const FIREBASE_URL = 'https://vlbaovework-default-rtdb.firebaseio.com/khach-vao.json';

  // Auto-fill current datetime
  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('entryTime').value = now.toISOString().slice(0,16);
  });

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = type === 'success' ? '✅ ' + msg : '❌ ' + msg;
    t.className = 'show ' + type;
    setTimeout(() => { t.className = ''; }, 3500);
  }

  function setLoading(on) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function resetForm() {
    document.getElementById('regForm').reset();
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('entryTime').value = now.toISOString().slice(0,16);
  }

  function validate() {
    const ids = ['companyName','fullName','phone','dob','idNumber','idDate','idPlace','entryTime','supervisor','department','reason'];
    for (const id of ids) {
      const el = document.getElementById(id);
      if (!el.value.trim()) {
        el.focus();
        el.style.borderColor = '#EF4444';
        setTimeout(() => el.style.borderColor = '', 1800);
        return false;
      }
    }
    return true;
  }

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validate()) { showToast('Vui lòng điền đầy đủ thông tin!', 'error'); return; }

    const data = {
      congTy:       document.getElementById('companyName').value.trim(),
      hoTen:        document.getElementById('fullName').value.trim(),
      sdt:          document.getElementById('phone').value.trim(),
      ngaySinh:     document.getElementById('dob').value,
      soCMT:        document.getElementById('idNumber').value.trim(),
      ngayCapCMT:   document.getElementById('idDate').value,
      noiCapCMT:    document.getElementById('idPlace').value.trim(),
      thoiGianVao:  document.getElementById('entryTime').value,
      nguoiPhuTrach:document.getElementById('supervisor').value.trim(),
      boPhan:       document.getElementById('department').value,
      lyDo:         document.getElementById('reason').value.trim(),
      thoiGianGhi:  new Date().toISOString(),
    };

    setLoading(true);
    try {
      const res = await fetch(FIREBASE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast('Đã lưu thành công!', 'success');
      setTimeout(resetForm, 800);
    } catch (err) {
      console.error(err);
      showToast('Lỗi kết nối, thử lại!', 'error');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
